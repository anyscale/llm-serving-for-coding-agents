# service_scale_to_zero.yaml — the SAME optimized deployment, but the GPU scales to ZERO when idle
# (nights/weekends): MIN_REPLICAS=0 + min_nodes: 0. At ~10 h/day on weekdays that's ≈ $840/mo vs
# ≈ $2,900 always-on — see COST-ESTIMATE.md. Pair it with warmup.sh on a weekday-morning cron
# (warmup_schedule.yaml) so the first developer of the day never waits out the cold start.
name: qwen3-6-27b-fp8-rtxpro6000-s2z
containerfile: Containerfile
env_vars:
  # Direct-streaming flags — service-level so the Serve controller sees them (see service_optimized.yaml).
  RAY_SERVE_ENABLE_HA_PROXY: "1"
  RAY_SERVE_LLM_ENABLE_DIRECT_STREAMING: "1"
  # Scale-to-zero knobs read back by serve_qwen3_6_27b_optimized.py:
  MIN_REPLICAS: "0"          # idle -> 0 replicas -> the g7e node terminates (min_nodes: 0 below)
  DOWNSCALE_DELAY_S: "1800"  # 30 min idle before scaling down, so a lunch-break lull != a cold start
compute_config:
  # Uncomment to improve spot availability by drawing from every AZ in the region:
  # flags:
  #   enable_cross_zone_scaling: true
  worker_nodes:
    # AWS g7e.4xlarge = 1x NVIDIA RTX PRO 6000 96GB (Blackwell SM120), 16 vCPU, 128 GiB host RAM; TP=1.
    - instance_type: g7e.4xlarge
      min_nodes: 0                 # let the GPU node terminate when the deployment sits at 0 replicas
      max_nodes: 4                 # autoscale headroom (matches max_replicas=4)
      # Spot cuts the GPU rate ~43% (COST-ESTIMATE.md). Uncomment for spot-first with on-demand
      # fallback; preempted replicas restart on a fresh node (~3 min with the fast-start work).
      # market_type: PREFER_SPOT
working_dir: .
applications:
  - import_path: serve_qwen3_6_27b_optimized:app
