# service_naive.yaml — the NAIVE baseline (TUTORIAL.md Step 0). 4x L4, single replica.
# Exposes native /v1/chat/completions + /v1/messages + /v1/responses via DIRECT STREAMING
# (see ../part2a-connect-clients-direct/). Direct streaming needs two flags in the Ray Serve
# *controller's* environment; set them as SERVICE-LEVEL env_vars (below) — Anyscale applies these
# cluster-wide, so the controller inherits them, with NO custom image. (A per-deployment runtime_env
# reaches only the replicas, not the controller, so the deploy would fail "ingress_request_router
# requires HAProxy".) Validated 2026-06-30: all three native endpoints return HTTP 200.
# Deploy only to compare against the optimized version; not for production.
name: qwen3-6-27b-fp8-naive
image_uri: anyscale/ray-llm:2.56.0-py312-cu130   # stock ray-llm GA (vLLM 0.22.0) — no custom image
env_vars:
  RAY_SERVE_ENABLE_HA_PROXY: "1"               # cluster-level → reaches the Serve controller (enables HAProxy)
  RAY_SERVE_LLM_ENABLE_DIRECT_STREAMING: "1"   # exposes vLLM's native /v1/messages + /v1/responses
compute_config:
  worker_nodes:
    - instance_type: g6.12xlarge   # AWS: 4x L4 (24 GB) — the GPU shape available for the Ray Summit session (TP=4)
      min_nodes: 1
      max_nodes: 1                 # single replica
working_dir: .
applications:
  - import_path: serve_qwen3_6_27b_naive:app
